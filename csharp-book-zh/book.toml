[book]
title = "Rust for C# Programmers（中文版）"
authors = ["Rust Training Team", "翻译：cairui & Mavis"]
language = "zh"
src = "src"

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/wgcairui/RustTraining"
default-theme = "light"
preferred-dark-theme = "ayu"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[preprocessor.mermaid]
command = "mdbook-mermaid"
optional = true

[output.html.playground]
editable = true
line-numbers = true